services:
  - type: web
    name: monapi-video-online
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FAL_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
    plan: free
